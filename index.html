<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bakhaw AI System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- INPUT -->
  <div class="panel input">
    <h2>Environmental Inputs</h2>

    <label>Elevation</label>
    <input id="elevation" type="range" min="0" max="10" step="0.1" oninput="runModel()">

    <label>Soil pH</label>
    <input id="ph" type="range" min="4" max="9" step="0.1" oninput="runModel()">

    <label>Salinity</label>
    <input id="salinity" type="range" min="0" max="40" step="1" oninput="runModel()">

    <label>Moisture</label>
    <input id="moisture" type="range" min="0" max="100" step="1" oninput="runModel()">

    <div id="values"></div>
  </div>

  <!-- OUTPUT -->
  <div class="panel output">

    <h2>Model Output</h2>

    <div class="card">
      <p>Hydrological Prior Index</p>
      <h3 id="hpi"></h3>
    </div>

    <div class="card highlight">
      <p>CSI</p>
      <h1 id="csi"></h1>
    </div>

    <div class="card">
      <p>Classification</p>
      <h2 id="class"></h2>
    </div>

    <div class="card">
      <p>Confidence</p>
      <h3 id="conf"></h3>
    </div>

    <div class="card">
      <p>Recommended Species</p>
      <div id="species"></div>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>

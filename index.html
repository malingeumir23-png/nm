<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakhaw AI</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>Bakhaw AI</h1>
        <p>Ecological Intelligence System</p>
      </div>
    </div>

    <div class="inputBox">
      <label>Latitude</label>
      <input id="lat" placeholder="7.07"/>

      <label>Longitude</label>
      <input id="lon" placeholder="125.60"/>

      <button onclick="runScan()">Analyze Ecosystem</button>
    </div>

    <div class="note">
      Click species to view images & ecological data
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- RESULT CARD -->
    <section class="card hero">
      <h2>Suitability Output</h2>
      <div id="result" class="result">
        Enter coordinates to begin analysis
      </div>
    </section>

    <!-- SPECIES GRID -->
    <section class="card">
      <h2>Mangrove Species Database</h2>

      <div class="grid">
        <div class="tile" onclick="openSpecies('Rhizophora mucronata')">
          Rhizophora mucronata
        </div>

        <div class="tile" onclick="openSpecies('Avicennia marina')">
          Avicennia marina
        </div>

        <div class="tile" onclick="openSpecies('Sonneratia alba')">
          Sonneratia alba
        </div>
      </div>
    </section>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>

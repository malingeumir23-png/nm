<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakhaw AI GIS (Leaflet)</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div id="map"></div>

<!-- LEFT PANEL -->
<div class="panel">
  <h3>🌿 Bakhaw AI Layers</h3>
  <p>Toggle ecological intelligence layers</p>

  <div class="layers">
    <label><input type="checkbox" id="layerMangrove" checked> Mangrove Points</label>
    <label><input type="checkbox" id="layerSalinity" checked> Salinity Proxy</label>
  </div>

  <p id="info">Click map for species analysis</p>
</div>

<!-- RIGHT INSPECTOR -->
<div id="inspector" class="inspector hidden">
  <div class="inspector-header">
    <h2 id="speciesName">Species</h2>
    <button onclick="closeInspector()">✕</button>
  </div>

  <img id="speciesImage"/>

  <div class="inspector-body">
    <p id="speciesInfo"></p>
    <div class="meta">
      <div><strong>Salinity:</strong> <span id="salinity"></span></div>
      <div><strong>Status:</strong> Suitable Ecological Zone</div>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="app.js"></script>

<script>
function closeInspector(){
  document.getElementById("inspector").classList.add("hidden");
}
</script>

</body>
</html>

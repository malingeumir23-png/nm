<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakhaw AI Dashboard</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>BAKHAW AI</h1>
    <p>Mangrove Suitability Intelligence System</p>
  </div>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- INPUT PANEL -->
    <div class="card">
      <h2>Field Scan</h2>

      <label>Latitude</label>
      <input id="lat" placeholder="e.g. 7.07"/>

      <label>Longitude</label>
      <input id="lon" placeholder="e.g. 125.60"/>

      <button onclick="runScan()">Analyze Site</button>

      <p class="hint">Click analyze to get species recommendation</p>
    </div>

    <!-- RESULT PANEL -->
    <div class="card highlight">
      <h2>Recommendation</h2>

      <div id="result">
        Awaiting input...
      </div>
    </div>

  </div>

  <!-- SPECIES PANEL -->
  <div class="card full">
    <h2>Species Database</h2>

    <div class="species-grid">

      <div class="species" onclick="openSpecies('Rhizophora mucronata')">
        Rhizophora mucronata
      </div>

      <div class="species" onclick="openSpecies('Avicennia marina')">
        Avicennia marina
      </div>

      <div class="species" onclick="openSpecies('Sonneratia alba')">
        Sonneratia alba
      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>

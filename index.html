<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakhaw AI | Mangrove Intelligence</title>

  <!-- Mapbox -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div id="app">

  <!-- LEFT INFO PANEL -->
  <div class="panel">
    <div class="brand">
      <div class="frame"></div>
      <h2>Bakhaw AI</h2>
    </div>

    <p class="subtitle">Mangrove Suitability Intelligence</p>

    <div class="info-box">
      <p id="info">Click anywhere on the map to analyze site suitability</p>
    </div>

    <div class="legend">
      <div><span class="dot suitable"></span> Suitable</div>
      <div><span class="dot marginal"></span> Marginal</div>
      <div><span class="dot unsuitable"></span> Unsuitable</div>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

</div>

<!-- Mapbox -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="app.js"></script>

</body>
</html>

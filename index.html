<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bakhaw AI Simulation</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

  <header>
    <h1>🌳 Bakhaw AI Simulation</h1>
    <p>Mangrove Suitability Engine</p>
  </header>

  <div class="panel">

    <h2>Environmental Controls</h2>

    <!-- SALINITY -->
    <label>Soil Salinity (EC)</label>
    <input type="range" id="salinity" min="0" max="50" value="25" oninput="updateValues();">

    <span id="salinityVal">25</span>

    <!-- PH -->
    <label>Soil pH</label>
    <input type="range" id="ph" min="3" max="10" value="7" step="0.1" oninput="updateValues();">

    <span id="phVal">7</span>

    <!-- MOISTURE -->
    <label>Moisture (%)</label>
    <input type="range" id="moisture" min="0" max="100" value="60" oninput="updateValues();">

    <span id="moistureVal">60</span>

    <!-- ELEVATION -->
    <label>Elevation (m)</label>
    <input type="range" id="elevation" min="0" max="20" value="3" oninput="updateValues();">

    <span id="elevationVal">3</span>

    <button onclick="runSimulation()">Run Simulation</button>

  </div>

  <div class="result-box">
    <h2>Prediction</h2>
    <div id="output">Waiting for input...</div>
  </div>

  <div class="species-box">
    <h2>Recommended Species</h2>
    <div id="speciesList"></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakhaw AI Dashboard</title>

  <!-- SORA FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="bg"></div>

<div class="app">

  <header>
    <h1>Bakhaw AI</h1>
    <p>Mangrove Suitability Simulation</p>
  </header>

  <!-- SLIDERS (glass cards) -->
  <div class="grid">

    <div class="card glass">
      <label>Salinity</label>
      <input type="range" min="0" max="100" value="50" id="salinity">
      <span id="salinityVal">50</span>
    </div>

    <div class="card glass">
      <label>Redox</label>
      <input type="range" min="0" max="100" value="50" id="redox">
      <span id="redoxVal">50</span>
    </div>

    <div class="card glass">
      <label>Moisture</label>
      <input type="range" min="0" max="100" value="50" id="moisture">
      <span id="moistureVal">50</span>
    </div>

    <div class="card glass result">
      <h3>Recommended Species</h3>
      <p id="species">—</p>
      <button id="searchBtn">View Image</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>

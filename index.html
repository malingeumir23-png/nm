<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bakhaw AI Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Bakhaw AI System</h1>
    <p>AIoT Mangrove Suitability Dashboard</p>
  </div>

  <div class="grid">

    <!-- Sensor Panel -->
    <div class="card">
      <h2>Field Sensors</h2>
      <div id="sensors"></div>
    </div>

    <!-- Hydrology -->
    <div class="card">
      <h2>Hydrological Prior</h2>
      <div id="hydro"></div>
    </div>

    <!-- ML Output -->
    <div class="card result">
      <h2>Suitability Result</h2>
      <div id="result"></div>
    </div>

    <!-- Explainability -->
    <div class="card">
      <h2>Explainability</h2>
      <div id="explain"></div>
    </div>

  </div>

  <button onclick="runSimulation()">Run Analysis</button>

</div>

<script src="app.js"></script>
</body>
</html>

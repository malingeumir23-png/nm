<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Bakhaw AI Mobile</title>

<!-- PWA-style mobile feel -->
<meta name="theme-color" content="#ff69b4">

<!-- Sora Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <h1>🌿 Bakhaw AI 𓂃 ོ☼𓂃</h1>
      <p>Simulation Engine</p>
    </div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <h2>Environmental Controls</h2>

    <!-- SLIDERS -->
    <div class="control">
      <label>Salinity (EC)</label>
      <input type="range" id="salinity" min="0" max="50" value="25" oninput="updateValues()">
      <span id="salinityVal">25</span>
    </div>

    <div class="control">
      <label>Soil pH</label>
      <input type="range" id="ph" min="3" max="10" step="0.1" value="7" oninput="updateValues()">
      <span id="phVal">7</span>
    </div>

    <div class="control">
      <label>Moisture %</label>
      <input type="range" id="moisture" min="0" max="100" value="60" oninput="updateValues()">
      <span id="moistureVal">60</span>
    </div>

    <div class="control">
      <label>Elevation (m)</label>
      <input type="range" id="elevation" min="0" max="20" value="3" oninput="updateValues()">
      <span id="elevationVal">3</span>
    </div>

    <button onclick="runSimulation()">RUN SIMULATION</button>

  </div>

  <!-- RESULT -->
  <div class="card result">
    <h2>Result</h2>
    <div id="output">Adjust sliders to begin</div>
  </div>

  <!-- SPECIES -->
  <div class="card">
    <h2>Species</h2>
    <div id="speciesList"></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bakhaw AI Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

  <header>
    <h1>🌸 Bakhaw AI Simulation</h1>
    <p>Mangrove Suitability Predictor</p>
  </header>

  <!-- INPUT PANEL -->
  <div class="panel">

    <h2>Environmental Inputs</h2>

    <label>Soil Salinity (EC)</label>
    <input type="number" id="salinity" placeholder="e.g. 35">

    <label>Soil pH</label>
    <input type="number" id="ph" placeholder="e.g. 7">

    <label>Moisture (%)</label>
    <input type="number" id="moisture" placeholder="e.g. 60">

    <label>Elevation (m)</label>
    <input type="number" id="elevation" placeholder="e.g. 2">

    <button onclick="runSimulation()">Run Simulation</button>

  </div>

  <!-- OUTPUT -->
  <div class="result-box">
    <h2>Prediction</h2>
    <div id="output">Waiting for input...</div>
  </div>

  <!-- SPECIES -->
  <div class="species-box">
    <h2>Recommended Species</h2>
    <div id="speciesList"></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
